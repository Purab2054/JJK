<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For Someone Special 💖</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Georgia, serif;
  background:linear-gradient(to right,#ffe6f0,#fff0f5);
  text-align:center;
  color:#4b0033;
  overflow-x:hidden;
}

/* MAIN PHOTO */
.hero img{
  width:320px;
  margin-top:40px;
  border-radius:25px;
  box-shadow:0 20px 50px rgba(0,0,0,0.4);
  animation:fadeIn 1.5s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

/* MESSAGE */
#message{
  font-size:30px;
  min-height:60px;
  margin:30px 20px;
  border-right:2px solid #ff4da6;
  display:inline-block;
  padding-right:5px;
}

/* BUTTONS */
button{
  padding:12px 30px;
  font-size:18px;
  border:none;
  border-radius:30px;
  cursor:pointer;
  margin:10px;
  transition:0.3s;
}

.yes{
  background:#ff1a75;
  color:white;
}

.no{
  background:white;
  color:#ff1a75;
  position:absolute;
}

.yes:hover{
  transform:scale(1.1);
}

/* ROMANTIC GALLERY */
.gallery{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:40px;
  margin:70px 20px;
}

.gallery img{
  width:220px;
  height:280px;
  object-fit:cover;
  border-radius:20px;
  padding:10px;
  background:white;
  box-shadow:0 20px 40px rgba(255,0,102,0.3);
  transition:0.6s ease;
  transform:rotate(-3deg);
  animation:float 4s ease-in-out infinite;
}

.gallery img:nth-child(2){ transform:rotate(3deg); }
.gallery img:nth-child(3){ transform:rotate(-5deg); }
.gallery img:nth-child(4){ transform:rotate(4deg); }

.gallery img:hover{
  transform:scale(1.1) rotate(0deg);
  box-shadow:0 30px 60px rgba(255,0,102,0.6);
}

/* FLOAT ANIMATION */
@keyframes float{
  0%{transform:translateY(0px);}
  50%{transform:translateY(-15px);}
  100%{transform:translateY(0px);}
}

/* HEARTS */
.heart{
  position:absolute;
  font-size:20px;
  animation:rise 5s linear infinite;
  color:#ff4da6;
}

@keyframes rise{
  0%{transform:translateY(0);opacity:1;}
  100%{transform:translateY(-700px);opacity:0;}
}

.love-line{
  font-size:22px;
  color:#ff1a75;
  margin-bottom:20px;
}
</style>
</head>

<body>

<div class="hero">
  <img src="https://i.postimg.cc/m2z8Pry1/626cacd3-7503-4cc7-9fbf-712e22ef2a08.jpg">
</div>

<div id="message"></div>

<button class="yes" onclick="acceptLove()">YES 💖</button>
<button class="no" id="noBtn">NO 😜</button>

<div class="gallery">
  <img src="https://i.postimg.cc/3J4nkwFN/00f06fd3-88fb-4818-af80-504a7108e777.jpg">
  <img src="https://i.postimg.cc/J4DPsh5B/b9b5a1e9-7dc9-4231-a1f6-a5017e509055.jpg">
  <img src="https://i.postimg.cc/L40x4PL4/c21b04bc-6f1d-4e7c-9e24-d38824dcbc76.jpg">
  <img src="https://i.postimg.cc/HWP6WMX5/bc5cc574-7078-4c68-88f4-947111237242.jpg">
</div>

<div class="love-line">
  Every picture with you feels like a memory I never want to lose 💕
</div>

<script>
const msg = "You are the most beautiful part of my life 💖 Will You Be Mine Forever? 💍";
let index=0;
function typeWriter(){
  if(index<msg.length){
    document.getElementById("message").innerHTML += msg.charAt(index);
    index++;
    setTimeout(typeWriter,45);
  }
}
typeWriter();

/* NO BUTTON RUN */
const noBtn=document.getElementById("noBtn");
noBtn.addEventListener("mouseover",function(){
  noBtn.style.top=Math.random()*80+"%";
  noBtn.style.left=Math.random()*80+"%";
});

/* YES CLICK */
function acceptLove(){
  document.getElementById("message").innerHTML="💖 You Just Made Me The Happiest Person Alive 💖";
  makeHearts();
}

function makeHearts(){
  for(let i=0;i<50;i++){
    const heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="💖";
    heart.style.left=Math.random()*window.innerWidth+"px";
    heart.style.fontSize=(15+Math.random()*30)+"px";
    document.body.appendChild(heart);
    setTimeout(()=>{heart.remove();},5000);
  }
}
</script>

</body>
</html>

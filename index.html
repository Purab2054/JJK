<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For Harshali 💖</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Georgia, serif;
  background:linear-gradient(to right,#ffe6f0,#fff0f5);
  color:#4b0033;
  text-align:center;
  overflow-x:hidden;
}

/* BIG PHOTO */
.hero img{
  width:300px;
  border-radius:20px;
  margin-top:30px;
  box-shadow:0 15px 40px rgba(0,0,0,0.4);
  animation:fadeIn 1.5s ease-in-out;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

/* TYPEWRITER TEXT */
#message{
  font-size:28px;
  min-height:50px;
  margin:25px 0;
  border-right:2px solid #ff4da6;
  padding-right:4px;
  display:inline-block;
}

/* BUTTONS */
button{
  padding:12px 28px;
  font-size:18px;
  border:none;
  border-radius:30px;
  cursor:pointer;
  margin:12px;
  transition:0.3s;
}

.yes{
  background:#ff1a75;
  color:white;
}
.no{
  background:white;
  color:#ff1a75;
  position:absolute;
}

/* GALLERY */
.gallery{
  display:flex;
  justify-content:center;
  gap:15px;
  margin-top:30px;
}

.gallery img{
  width:90px;
  border-radius:15px;
  box-shadow:0 8px 20px rgba(0,0,0,0.3);
  transition:0.3s;
}

.gallery img:hover{
  transform:scale(1.1);
}

/* HEART ANIMATION */
.heart{
  position:absolute;
  font-size:20px;
  animation:rise 5s linear infinite;
  color:#ff4da6;
}

@keyframes rise{
  0%{transform:translateY(0);opacity:1;}
  100%{transform:translateY(-700px);opacity:0;}
}
</style>
</head>

<body>

<div class="hero">
  <img src="https://i.postimg.cc/m2z8Pry1/626cacd3-7503-4cc7-9fbf-712e22ef2a08.jpg">
</div>

<div id="message"></div>

<button class="yes" onclick="acceptLove()">YES 💖</button>
<button class="no" id="noBtn">NO 😜</button>

<div class="gallery">
  <img src="https://i.postimg.cc/3J4nkwFN/00f06fd3-88fb-4818-af80-504a7108e777.jpg">
  <img src="https://i.postimg.cc/J4DPsh5B/b9b5a1e9-7dc9-4231-a1f6-a5017e509055.jpg">
  <img src="https://i.postimg.cc/L40x4PL4/c21b04bc-6f1d-4e7c-9e24-d38824dcbc76.jpg">
  <img src="https://i.postimg.cc/HWP6WMX5/bc5cc574-7078-4c68-88f4-947111237242.jpg">
</div>

<script>
/* TYPEWRITER TEXT */
const msg = "Harshali… Tumhari ek muskurahat ne meri duniya palat di… 💕 Will You Be Mine Forever? 💍";
let index=0;
function typeWriter(){
  if(index<msg.length){
    document.getElementById("message").innerHTML += msg.charAt(index);
    index++;
    setTimeout(typeWriter,45);
  }
}
typeWriter();

/* NO BUTTON RUN */
const noBtn = document.getElementById("noBtn");
noBtn.addEventListener("mouseover", function(){
  noBtn.style.top = Math.random()*80 + "%";
  noBtn.style.left = Math.random()*80 + "%";
});

/* YES CLICK */
function acceptLove(){
  document.getElementById("message").innerHTML = "💖 I Always Knew You Would Say Yes… You Made My Heart Complete 💖";
  makeHearts();
}

/* FLOATING HEARTS */
function makeHearts(){
  for(let i=0;i<50;i++){
    const heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="💖";
    heart.style.left = Math.random()*window.innerWidth+"px";
    heart.style.fontSize = (15 + Math.random()*30)+"px";
    document.body.appendChild(heart);
    setTimeout(()=>{heart.remove();},5000);
  }
}
</script>

</body>
</html>
